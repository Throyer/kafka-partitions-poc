services:
  producer:
    image: throyer/poc/rabbitmq-partitions-producer
    container_name: producer
    ports:
      - "8081:8080"
      - "${DEBUG_PORT_PRODUCER}:${DEBUG_PORT_PRODUCER}"
    expose:
      - 8080
    build:
      context: ../
      dockerfile: .docker/Dockerfile
    environment:
      TZ: "${TIMEZONE}"
    env_file:
      - ".env"
    volumes:
      - ../producer:/app
      - maven:/root/.m2/repository
    links:
      - kafka
    depends_on:
      - kafka
    
  consumer:
    image: throyer/poc/rabbitmq-partititons-consumer
    container_name: consumer
    ports:
      - "8082:8080"
      - "${DEBUG_PORT_CONSUMER}:${DEBUG_PORT_CONSUMER}"
    expose:
      - 8080
    build:
      context: ../
      dockerfile: .docker/Dockerfile
    environment:
      TZ: "${TIMEZONE}"
    env_file:
      - ".env"
    volumes:
      - ../consumer:/app
      - maven:/root/.m2/repository
    links:
      - database
      - kafka
    depends_on:
      - kafka
      - database
      
  database:
    container_name: database
    image: mongo:7
    restart: unless-stopped
    ports:
      - "${DB_PORT}:27017"
    environment:
      TZ: "${TIMEZONE}"
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
      MONGO_INITDB_ROOT_DATABASE: root_database
    volumes:
      - ./database/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
      - ~/.volumes/throyer/pocs/rabbitmq-streams/mongodb:/data/db

  rabbitmq:
    image: rabbitmq:3.13.7-management
    restart: unless-stopped
    container_name: rabbitmq
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_STREAM_PORT}:5552"
      - "${RABBITMQ_CLIENT_WEB_PORT}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    extra_hosts:
      - "host.docker.internal:172.17.0.1"

  kafka:
    image: confluentinc/cp-kafka:6.0.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LISTENERS: INTERNAL://:9092,OUTSIDE://:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,OUTSIDE://host.docker.internal:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,OUTSIDE:PLAINTEXT
    extra_hosts:
      - "host.docker.internal:172.17.0.1"

  control-center:
    image: confluentinc/cp-enterprise-control-center:6.0.1
    hostname: control-center
    depends_on:
      - kafka
    ports:
      - "9021:9021"
    environment:
      CONTROL_CENTER_BOOTSTRAP_SERVERS: 'kafka:9092'
      CONTROL_CENTER_REPLICATION_FACTOR: 1
      CONTROL_CENTER_CONNECT_CLUSTER: http://app-connect:8083
      PORT: 9021
    extra_hosts:
      - "host.docker.internal:172.17.0.1"

volumes:
  maven: