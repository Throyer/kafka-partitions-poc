services:
  database:
    container_name: database
    hostname: database
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      TZ: "${TIMEZONE}"
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
      MONGO_INITDB_ROOT_DATABASE: root_database
    volumes:
      - ./database/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
      - ~/.volumes/pocs/aftersale-estruturante/database/mongodb:/data/db

  rabbitmq:
    image: rabbitmq:3.10.7-management
    container_name: rabbitmq
    hostname: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    environment:
      RABBITMQ_DEFAULT_USER: root
      RABBITMQ_DEFAULT_PASS: root
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  external-domains-mock:
    build:
      context: ../external-domains-mock
      dockerfile: Dockerfile
    container_name: external-domains-mock
    hostname: external
    restart: unless-stopped
    ports:
      - "${MOCK_PORT:-3001}:3001"
    environment:
      PORT: 3001
      TZ: "${TIMEZONE}"
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://127.0.0.1:3001/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: maven:3.9.9-eclipse-temurin-17
    container_name: backend
    working_dir: /app
    volumes:
      - ..:/app
      - maven-cache:/root/.m2
    ports:
      - "8080:8080"
      - "5005:5005"
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      DB_URI: mongodb://root:root@database:27017/after_sale
      CORPORATE_CUSTOMERS_HOST: http://external-domains-mock:3001
      CORPORATE_ORDERS_HOST: http://external-domains-mock:3001
      CORPORATE_PAYMENTS_HOST: http://external-domains-mock:3001
      CORPORATE_PRODUCTS_HOST: http://external-domains-mock:3001
    depends_on:
      database:
        condition: service_started
      external-domains-mock:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: ["./entrypoint.sh"]

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    extra_hosts:
      - "host.docker.internal:172.17.0.1"

  kafka:
    image: confluentinc/cp-kafka:6.0.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LISTENERS: INTERNAL://:9092,OUTSIDE://:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,OUTSIDE://host.docker.internal:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,OUTSIDE:PLAINTEXT
    extra_hosts:
      - "host.docker.internal:172.17.0.1"

  control-center:
    image: confluentinc/cp-enterprise-control-center:6.0.1
    hostname: control-center
    depends_on:
      - kafka
    ports:
      - "9021:9021"
    environment:
      CONTROL_CENTER_BOOTSTRAP_SERVERS: 'kafka:9092'
      CONTROL_CENTER_REPLICATION_FACTOR: 1
      CONTROL_CENTER_CONNECT_CLUSTER: http://app-connect:8083
      PORT: 9021
    extra_hosts:
      - "host.docker.internal:172.17.0.1"

volumes:
  maven-cache:
