events {
    worker_connections 1000;
}

http {
    access_log off;
    sendfile   on;
    
    upstream api {
        server api01:8080;
        server api02:8080;
        server api03:8080;
        server api04:8080;
    }

    server {
        listen 80;
        
        location / {
            proxy_pass http://api;
        }
    }
}