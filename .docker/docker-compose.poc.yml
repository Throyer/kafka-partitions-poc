x-app-base: &app-base
  build:
    context: ..
    dockerfile: Dockerfile.poc
  image: poc-aftersale-rabbitmq:poc
  restart: unless-stopped
  environment:
    SPRING_RABBITMQ_HOST: rabbitmq
    DB_URI: mongodb://root:root@database:27017/after_sale
    KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    KAFKA_TOPICS_0_NAME: TRACKING_UPDATE_AFTERSALE
    KAFKA_TOPICS_0_CONSUMER_GROUP_ID: aftersale-update
    KAFKA_TOPICS_0_LISTENER_SETTINGS_CONCURRENCY: 3
    CORPORATE_CUSTOMERS_HOST: http://mocks:3001
    CORPORATE_ORDERS_HOST: http://mocks:3001
    CORPORATE_PAYMENTS_HOST: http://mocks:3001
    CORPORATE_PRODUCTS_HOST: http://mocks:3001
  depends_on:
    rabbitmq:
      condition: service_healthy
    kafka:
      condition: service_started
  deploy:
    resources:
      limits:
        cpus: "0.60"
        memory: "250MB"

services:
  database:
    container_name: database
    hostname: database
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      TZ: "${TIMEZONE}"
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
      MONGO_INITDB_ROOT_DATABASE: root_database
    volumes:
      - ./database/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    deploy:
      resources:
        limits:
          cpus: "0.60"
          memory: "270MB"

  rabbitmq:
    image: rabbitmq:3.10.7-management
    container_name: rabbitmq
    hostname: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    environment:
      RABBITMQ_DEFAULT_USER: root
      RABBITMQ_DEFAULT_PASS: root
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.55"
          memory: "270MB"

  mocks:
    build:
      context: ./mocks
      dockerfile: Dockerfile
    container_name: mocks
    hostname: external
    restart: unless-stopped
    ports:
      - "${MOCK_PORT:-3001}:3001"
    environment:
      PORT: 3001
      TZ: "${TIMEZONE}"
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://127.0.0.1:3001/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  app-1:
    <<: *app-base
    container_name: backend-1
    hostname: backend-1

  app-2:
    <<: *app-base
    container_name: backend-2
    hostname: backend-2

  app-3:
    <<: *app-base
    container_name: backend-3
    hostname: backend-3

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    hostname: nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app-1
      - app-2
      - app-3
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: "10MB"
  
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    extra_hosts:
      - "host.docker.internal:172.17.0.1"

  kafka:
    image: confluentinc/cp-kafka:6.0.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LISTENERS: INTERNAL://:9092,OUTSIDE://:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,OUTSIDE://host.docker.internal:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,OUTSIDE:PLAINTEXT
    extra_hosts:
      - "host.docker.internal:172.17.0.1"

  control-center:
    image: confluentinc/cp-enterprise-control-center:6.0.1
    hostname: control-center
    depends_on:
      - kafka
    ports:
      - "9021:9021"
    environment:
      CONTROL_CENTER_BOOTSTRAP_SERVERS: 'kafka:9092'
      CONTROL_CENTER_REPLICATION_FACTOR: 1
      CONTROL_CENTER_CONNECT_CLUSTER: http://app-connect:8083
      PORT: 9021
    extra_hosts:
      - "host.docker.internal:172.17.0.1"
