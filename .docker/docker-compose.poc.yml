x-app-base: &app-base
  image: maven:3.9.9-eclipse-temurin-17
  working_dir: /app
  volumes:
    - ..:/app
    - maven-cache:/root/.m2
  environment:
    SPRING_RABBITMQ_HOST: rabbitmq
  depends_on:
    rabbitmq:
      condition: service_healthy
  command: ["./entrypoint.sh"]

services:
  database:
    container_name: database
    hostname: database
    image: mongo:7
    restart: unless-stopped
    ports:
      - "${DB_PORT}:27017"
    environment:
      TZ: "${TIMEZONE}"
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
      MONGO_INITDB_ROOT_DATABASE: root_database
    volumes:
      - ./database/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
      - ~/.volumes/pocs/aftersale-estruturante/database/mongodb:/data/db

  rabbitmq:
    image: rabbitmq:3.10.7-management
    container_name: rabbitmq
    hostname: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    environment:
      RABBITMQ_DEFAULT_USER: root
      RABBITMQ_DEFAULT_PASS: root
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  external-domains-mock:
    build:
      context: ../external-domains-mock
      dockerfile: Dockerfile
    container_name: external-domains-mock
    hostname: external
    restart: unless-stopped
    ports:
      - "${MOCK_PORT:-3001}:3001"
    environment:
      PORT: 3001
      TZ: "${TIMEZONE}"
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://127.0.0.1:3001/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  app-1:
    <<: *app-base
    container_name: backend-1
    hostname: backend-1
    ports:
      - "5005:5005"

  app-2:
    <<: *app-base
    container_name: backend-2
    hostname: backend-2
    ports:
      - "5006:5005"

  app-3:
    <<: *app-base
    container_name: backend-3
    hostname: backend-3
    ports:
      - "5007:5005"

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    hostname: nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app-1
      - app-2
      - app-3

volumes:
  maven-cache:
