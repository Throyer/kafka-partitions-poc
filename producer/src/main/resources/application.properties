spring.application.name=kafka-streams

# logging
logging.level.com.github.throyer=debug
logging.level.root=info
logging.level.org.mongodb.driver=error
logging.level.org.springframework.data.mongodb.core.MongoTemplate=error
spring.output.ansi.enabled=always

# kafka producer
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3

# database
spring.data.mongodb.auto-index-creation=true
spring.mongodb.uri=${DB_URI:mongodb://root:root@localhost:27017/streams_mvp}