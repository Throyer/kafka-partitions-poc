spring.application.name=aftersale

# logging
logging.level.root=info
logging.level.org.mongodb.driver=error
logging.level.org.springframework.data.mongodb.core.MongoTemplate=error
logging.level.com.example.poc=info
logging.level.org.springframework.data.convert.CustomConversions=error
feign.logging.level=BASIC
spring.output.ansi.enabled=always
logging.level.org.apache.kafka=warn
logging.level.org.springframework.kafka=warn


# database
spring.data.mongodb.auto-index-creation=true
spring.data.mongodb.uri=${DB_URI:mongodb://root:root@localhost:27017/after_sale}

# Order/OMS (connection)
rabbitmq.settings.connections[0].name=OMS
rabbitmq.settings.connections[0].host=${RABBITMQ_ORDER_HOST:rabbitmq}
rabbitmq.settings.connections[0].port=${RABBITMQ_ORDER_PORT:5672}
rabbitmq.settings.connections[0].username=${RABBITMQ_ORDER_USERNAME:root}
rabbitmq.settings.connections[0].password=${RABBITMQ_ORDER_PASSWORD:root}
rabbitmq.settings.connections[0].virtual-host=${RABBITMQ_ORDER_VIRTUAL_HOST:/order}
rabbitmq.settings.connections[0].ssl-settings.enabled=${RABBITMQ_ENABLE_SSL:false}
rabbitmq.settings.connections[0].ssl-settings.algorithm=TLSv1.2
rabbitmq.settings.connections[0].listener-settings.default-requeue-rejected=false
rabbitmq.settings.connections[0].listener-settings.concurrent-consumers=3
rabbitmq.settings.connections[0].listener-settings.prefetch=50

# Tracking (connection)
rabbitmq.settings.connections[1].name=TRACKING
rabbitmq.settings.connections[1].host=${RABBITMQ_TRACKING_HOST:rabbitmq}
rabbitmq.settings.connections[1].port=${RABBITMQ_TRACKING_PORT:5672}
rabbitmq.settings.connections[1].username=${RABBITMQ_TRACKING_USERNAME:root}
rabbitmq.settings.connections[1].password=${RABBITMQ_TRACKING_PASSWORD:root}
rabbitmq.settings.connections[1].virtual-host=${RABBITMQ_TRACKING_VIRTUAL_HOST:/tracking}
rabbitmq.settings.connections[1].ssl-settings.enabled=${RABBITMQ_ENABLE_SSL:false}
rabbitmq.settings.connections[1].ssl-settings.algorithm=TLSv1.2
rabbitmq.settings.connections[1].listener-settings.default-requeue-rejected=false
rabbitmq.settings.connections[1].listener-settings.concurrent-consumers=3
rabbitmq.settings.connections[1].listener-settings.prefetch=50

# TMS (connection)
rabbitmq.settings.connections[2].name=TMS
rabbitmq.settings.connections[2].host=${RABBITMQ_TMS_HOST:rabbitmq}
rabbitmq.settings.connections[2].port=${RABBITMQ_TMS_PORT:5672}
rabbitmq.settings.connections[2].username=${RABBITMQ_TMS_USERNAME:root}
rabbitmq.settings.connections[2].password=${RABBITMQ_TMS_PASSWORD:root}
rabbitmq.settings.connections[2].virtual-host=${RABBITMQ_TMS_VIRTUAL_HOST:/tms}
rabbitmq.settings.connections[2].ssl-settings.enabled=${RABBITMQ_ENABLE_SSL:false}
rabbitmq.settings.connections[2].ssl-settings.algorithm=TLSv1.2
rabbitmq.settings.connections[2].listener-settings.default-requeue-rejected=false
rabbitmq.settings.connections[2].listener-settings.concurrent-consumers=3
rabbitmq.settings.connections[2].listener-settings.prefetch=50

# kafka
kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
kafka.client-id=${KAFKA_CLIENT_ID:aftersale}

# topics
kafka.topics[0].name=TRACKING_UPDATE_AFTERSALE
kafka.topics[0].consumer-group-id=${KAFKA_AFTERSALE_CONSUMER_GROUP:aftersale-update}
kafka.topics[0].listener-settings.concurrency=1

# corporate domains
corporate.customers-host=${CORPORATE_CUSTOMERS_HOST:http://localhost:3001}
corporate.orders-host=${CORPORATE_ORDERS_HOST:http://localhost:3001}
corporate.payments-host=${CORPORATE_PAYMENTS_HOST:http://localhost:3001}
corporate.products-host=${CORPORATE_PRODUCTS_HOST:http://localhost:3001}