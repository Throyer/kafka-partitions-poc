spring.application.name=kafka-streams

# logging
logging.level.com.github.throyer=debug
logging.level.root=info
logging.level.org.mongodb.driver=error
logging.level.org.springframework.data.mongodb.core.MongoTemplate=error
spring.output.ansi.enabled=always

# kafka consumer
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.kafka.consumer.group-id=after-sale-processors
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.listener.ack-mode=manual

# database
spring.data.mongodb.auto-index-creation=true
spring.data.mongodb.uri=${DB_URI:mongodb://root:root@localhost:27017/streams_mvp}